# nginx do frontend no RENDER: serve o SPA e faz proxy de /api -> backend PÚBLICO
# (hetros-backend.onrender.com) por HTTPS, mantendo tudo na mesma origem (sem CORS).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Resolver do Docker/Render para resolver o host do backend em runtime.
  resolver 127.0.0.11 8.8.8.8 valid=30s;

  # API -> backend público (HTTPS). Preserva o prefixo /api/v1.
  location /api/ {
    set $backend "https://hetros-backend.onrender.com";
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;                       # SNI (obrigatório p/ Render/TLS)
    proxy_set_header Host hetros-backend.onrender.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;                        # cold start do tier grátis (~50s)
  }

  # SPA: qualquer rota cai no index.html (React Router resolve no cliente).
  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
