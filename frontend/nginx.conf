# nginx do CD node: serve o SPA e faz proxy da API pro backend (mesma origem).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API -> backend (nome do serviço no docker-compose). Preserva o prefixo /api/v1.
  location /api/ {
    proxy_pass http://backend:3002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # SPA: qualquer rota cai no index.html (React Router resolve no cliente).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache dos assets com hash.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
