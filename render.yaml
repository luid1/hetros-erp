# Blueprint do Render — sobe o backend HETROS + Postgres grátis num clique.
# Como usar: Render Dashboard → New → Blueprint → aponta pro repo luid1/hetros-erp.
databases:
  - name: hetros-db
    plan: free
    databaseName: erp_wms
    user: hetros

services:
  - type: web
    name: hetros-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hetros-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: NFE_PROVIDER
        value: mock
      # 1º deploy: popula tenant/usuários/produtos num banco vazio. Depois mude p/ false.
      - key: SEED_ON_BOOT
        value: "true"

  # Frontend web (SPA nginx). Serve o ERP e os apps de tela cheia (/app/comprador,
  # /app/motorista) que os APKs abrem via WebView. O nginx faz proxy /api -> backend.
  - type: web
    name: hetros-frontend
    runtime: docker
    plan: free
    rootDir: frontend
    dockerfilePath: ./Dockerfile.render
    autoDeploy: true
